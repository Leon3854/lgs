services:
  # --- DATABASE ---
  db:
    image: postgres:15-alpine
    container_name: signal-lab-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: signal_lab
    ports:
      - "5438:5432" # Выносим наружу на 5438, чтобы не мешать другим проектам

  # --- BACKEND (NestJS) ---
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: signal-lab-api
    depends_on:
      - db
    ports:
      - "3001:3000" # API будет доступно на 3001
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/signal_lab"
      PORT: 3000
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    logging:
      driver: "json-file"
      options:
        tag: "nestjs-api"

  # --- OBSERVABILITY: Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    container_name: signal-lab-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  # --- OBSERVABILITY: Grafana ---
  grafana:
    image: grafana/grafana:latest
    container_name: signal-lab-grafana
    depends_on:
      - prometheus
    ports:
      - "3002:3000" # Grafana на 3002
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning